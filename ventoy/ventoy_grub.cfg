# MinNT Ventoy Boot Configuration
# Place this in /ventoy/ on your Ventoy USB
# Or copy minint.iso to the Ventoy partition directly!

# REQUIRED for framebuffer console on real hardware
insmod all_video
set gfxmode=1024x768x32,1024x768x24,1024x768,800x600x32,800x600,auto
set gfxpayload=keep

menuentry "MinNT - Real Hardware USB OS" --class custom --class os {
    echo "Loading MinNT Kernel..."
    echo "GPU: AMD/NVIDIA/Intel supported"
    echo "USB: xHCI 3.0 with HID Keyboard/Mouse"
    echo "Storage: AHCI/NVMe with NTFS/FAT32"
    echo "Network: NDIS with WiFi support"

    # Multiboot2 for MinNT
    multiboot2 /minint.elf
    boot
}

menuentry "MinNT - Debug Mode (Verbose)" --class custom --class debug {
    echo "Loading MinNT in DEBUG mode..."
    set gfxpayload=text
    multiboot2 /minint.elf
    boot
}

menuentry "MinNT - Safe Mode (No Graphics)" --class custom --class fallback {
    echo "Loading MinNT in text-only mode..."
    set gfxpayload=text
    multiboot2 /minint.elf
    boot
}
